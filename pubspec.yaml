name: shuttle_league
description: Badminton league management app

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.4.0

  # QR scanning + generation
  mobile_scanner: ^6.0.0
  qr_flutter: ^4.1.0

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  package_info_plus: ^8.0.0
  share_plus: ^10.0.0
  web: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

# Riverpod 3.x removed StateNotifier/StateProvider/AsyncValue.valueOrNull,
# which this app's code relies on throughout. Hard-pinned here so a
# resolution on any machine can never drift to 3.x even if its local
# pubspec.lock is missing or out of sync — ^2.5.1 above should already
# prevent this, but this closes the gap completely.
dependency_overrides:
  flutter_riverpod: 2.6.1
  riverpod: 2.6.1

flutter:
  uses-material-design: true
